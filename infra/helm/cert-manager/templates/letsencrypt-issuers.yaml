---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dev
spec:
  acme:
    email: j.mya.pitz@gmail.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dev
    solvers:
      # Primary: DNS-01 via Cloudflare (for Cloudflare-proxied domains)
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: cloudflare_api_token
      # Fallback: HTTP-01 via Traefik (for non-proxied domains)
      - http01:
          ingress:
            ingressClassName: traefik

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: j.mya.pitz@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      # Primary: DNS-01 via Cloudflare (for Cloudflare-proxied domains)
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: cloudflare_api_token
      # Fallback: HTTP-01 via Traefik (for non-proxied domains)
      - http01:
          ingress:
            ingressClassName: traefik
